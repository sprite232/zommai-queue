<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | ซ่อมมั้ย</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <h1>ซ่อมมั้ย — Admin</h1>
    <p>เข้าสู่ระบบจัดการคิวและแชท</p>
    <div class="login-form">
      <input class="login-input" id="loginPass" type="password" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="login-btn" onclick="doLogin()">เข้าสู่ระบบ →</button>
      <div class="login-error" id="loginError">รหัสผ่านไม่ถูกต้อง</div>
    </div>
  </div>
</div>

<!-- APP LAYOUT -->
<div class="app" id="appLayout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="icon">🔧</div>
      <div><div class="name">ซ่อมมั้ย</div><div class="sub">Admin Dashboard</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-item active" onclick="setView('queues')">
        <span class="sidebar-icon">📋</span> คิวทั้งหมด
        <span class="sidebar-badge" id="badgeNew">0</span>
      </div>
      <div class="sidebar-item" onclick="setView('chat')">
        <span class="sidebar-icon">💬</span> แชท
        <span class="sidebar-badge" id="badgeMsg">0</span>
      </div>
      <a href="index.html" class="sidebar-item" target="_blank">
        <span class="sidebar-icon">🌐</span> หน้าเว็บไซต์
      </a>
    </nav>
    <div class="sidebar-admin-info">
      <div class="admin-avatar">👨‍🔧</div>
      <div><div class="admin-name">Admin</div><div class="admin-role">ช่างซ่อมมั้ย</div></div>
      <div class="online-dot"></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <!-- Queue Panel (left) -->
    <div class="queue-panel">
      <div class="panel-header">
        <h2>คิวทั้งหมด <span class="queue-count" id="queueCountBadge">0</span></h2>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterQueues('all',this)">ทั้งหมด</button>
          <button class="filter-tab" onclick="filterQueues('waiting',this)">รอ</button>
          <button class="filter-tab" onclick="filterQueues('in_progress',this)">กำลังซ่อม</button>
          <button class="filter-tab" onclick="filterQueues('done',this)">เสร็จ</button>
        </div>
      </div>
      <div class="stats-row" id="statsRow">
        <div class="stat-chip"><span class="dot" style="background:#f59e0b"></span><span class="num" id="statWaiting">0</span> รอ</div>
        <div class="stat-chip"><span class="dot" style="background:#2563eb"></span><span class="num" id="statProgress">0</span> ดำเนินการ</div>
        <div class="stat-chip"><span class="dot" style="background:#10b981"></span><span class="num" id="statDone">0</span> เสร็จ</div>
      </div>
      <div class="queue-list" id="queueList">
        <div class="empty-queue"><div class="icon">📋</div>ยังไม่มีคิว</div>
      </div>
    </div>

    <!-- Chat Area (right) -->
    <div class="chat-area" id="chatArea">
      <div class="chat-placeholder" id="chatPlaceholder">
        <div class="big-icon">💬</div>
        <h3>เลือกคิวเพื่อเริ่มแชท</h3>
        <p style="color:#94a3b8;font-size:.85rem">คลิกที่รายการคิวทางซ้าย</p>
      </div>

      <!-- Active chat (hidden by default) -->
      <div id="activeChatWrap" style="display:none;flex:1;flex-direction:column;overflow:hidden;display:none;">
        <!-- Chat Header -->
        <div class="admin-chat-header">
          <div class="admin-avatar" style="width:40px;height:40px;background:var(--blue-50);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem">👤</div>
          <div>
            <div class="admin-chat-name" id="aChatName">—</div>
            <div class="admin-chat-info" id="aChatInfo">—</div>
          </div>
          <select class="status-selector" id="statusSelector" onchange="changeStatus(this.value)">
            <option value="waiting">⏳ รอดำเนินการ</option>
            <option value="in_progress">🔧 กำลังดำเนินการ</option>
            <option value="done">✅ เสร็จเรียบร้อย</option>
            <option value="cancelled">❌ ยกเลิก</option>
          </select>
        </div>
        <!-- Messages -->
        <div class="admin-messages" id="adminMessages">
        </div>
        <!-- Image preview -->
        <div class="admin-img-preview" id="adminImgPreview">
          <img id="adminImgThumb" src="" alt=""/>
          <span id="adminImgName" style="font-size:.83rem;color:#64748b;flex:1"></span>
          <button onclick="clearAdminImg()">✕</button>
        </div>
        <!-- Input -->
        <div class="admin-input-area">
          <button class="admin-img-btn" onclick="document.getElementById('adminImgFile').click()" title="ส่งรูป">📷</button>
          <input type="file" id="adminImgFile" accept="image/*" style="display:none" onchange="adminPreviewImg(this)"/>
          <textarea class="admin-textarea" id="adminTextarea" rows="1" placeholder="พิมพ์ข้อความตอบกลับ..." oninput="adminResize(this)" onkeydown="adminEnter(event)"></textarea>
          <button class="admin-send-btn" onclick="adminSend()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
